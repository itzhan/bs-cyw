<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路灯设备 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">路灯设备</h2>
            
<div class="card">
    <div class="card-header">
        <h3>路灯设备列表</h3>
        <button class="btn btn-primary btn-sm" onclick="location.href='map.html'" id="mapViewBtn"><i data-lucide="map" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>地图查看</button>
    </div>
    <div class="card-body">
        <div class="search-bar">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" placeholder="搜索路灯名称/编码..." onkeyup="if(event.key==='Enter')loadDevices()">
            </div>
            <select class="form-select" id="filterStatus" style="width:120px" onchange="loadDevices()">
                <option value="">全部状态</option>
                <option value="1">正常</option>
                <option value="0">故障</option>
                <option value="2">维护中</option>
            </select>
            <select class="form-select" id="filterOnline" style="width:120px" onchange="loadDevices()">
                <option value="">在线状态</option>
                <option value="1">在线</option>
                <option value="0">离线</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="loadDevices()">查询</button>
        </div>
        <div class="table-container">
            <table class="data-table">
                <thead><tr>
                    <th>编码</th><th>名称</th><th>灯型</th><th>功率(W)</th><th>在线</th><th>亮灯</th><th>设备状态</th><th>亮度</th><th>电压</th><th>温度</th><th>操作</th>
                </tr></thead>
                <tbody id="deviceTableBody"><tr><td colspan="11"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
            </table>
        </div>
        <div id="pagination"></div>
    </div>
</div>
<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header"><h3>路灯详情</h3><button class="modal-close" onclick="closeModal('detailModal')">✕</button></div>
        <div class="modal-body" id="detailContent"></div>
    </div>
</div>
        </div>
    </main>
</div>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>if(!initPage('device','路灯设备'))throw'';</script>
<script>
let currentPage = 1;
async function loadDevices(page) {
    currentPage = page || 1;
    try {
        const res = await lightApi.list({
            page: currentPage, size: 10,
            keyword: document.getElementById('searchInput').value,
            deviceStatus: document.getElementById('filterStatus').value,
            onlineStatus: document.getElementById('filterOnline').value
        });
        const d = res.data;
        document.getElementById('deviceTableBody').innerHTML = d.records.map(s => `
            <tr>
                <td><code>${s.code}</code></td>
                <td>${s.name}</td>
                <td>${s.lampType||'-'}</td>
                <td>${s.power||'-'}</td>
                <td>${statusTag('onlineStatus',s.onlineStatus)}</td>
                <td>${statusTag('lightStatus',s.lightStatus)}</td>
                <td>${statusTag('deviceStatus',s.deviceStatus)}</td>
                <td>${s.brightness}%</td>
                <td>${s.voltage?s.voltage+'V':'-'}</td>
                <td>${s.temperature?s.temperature+'℃':'-'}</td>
                <td><button class="btn btn-outline btn-sm" onclick="showDetail(${s.id})">详情</button></td>
            </tr>
        `).join('') || '<tr><td colspan="11" class="text-center text-muted">暂无数据</td></tr>';
        renderPagination('pagination', d.total, d.page, d.size, loadDevices);
    } catch(err) { showToast(err.message,'error'); }
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
async function showDetail(id) {
    try {
        const res = await lightApi.detail(id);
        const s = res.data;
        document.getElementById('detailContent').innerHTML = `
            <div class="grid-2">
                <div class="form-group"><label class="form-label">编码</label><div>${s.code}</div></div>
                <div class="form-group"><label class="form-label">名称</label><div>${s.name}</div></div>
                <div class="form-group"><label class="form-label">灯型</label><div>${s.lampType||'-'}</div></div>
                <div class="form-group"><label class="form-label">功率</label><div>${s.power?s.power+'W':'-'}</div></div>
                <div class="form-group"><label class="form-label">高度</label><div>${s.height?s.height+'m':'-'}</div></div>
                <div class="form-group"><label class="form-label">地址</label><div>${s.address||'-'}</div></div>
                <div class="form-group"><label class="form-label">在线状态</label><div>${statusTag('onlineStatus',s.onlineStatus)}</div></div>
                <div class="form-group"><label class="form-label">设备状态</label><div>${statusTag('deviceStatus',s.deviceStatus)}</div></div>
                <div class="form-group"><label class="form-label">亮度</label><div>${s.brightness}%</div></div>
                <div class="form-group"><label class="form-label">电压</label><div>${s.voltage?s.voltage+'V':'-'}</div></div>
                <div class="form-group"><label class="form-label">电流</label><div>${s.currentVal?s.currentVal+'A':'-'}</div></div>
                <div class="form-group"><label class="form-label">温度</label><div>${s.temperature?s.temperature+'℃':'-'}</div></div>
                <div class="form-group"><label class="form-label">运行时长</label><div>${s.runningHours?s.runningHours+'h':'-'}</div></div>
                <div class="form-group"><label class="form-label">安装日期</label><div>${s.installDate||'-'}</div></div>
            </div>`;
        document.getElementById('detailModal').classList.add('show');
    } catch(err) { showToast(err.message,'error'); }
}
loadDevices();
</script>
</body>
</html>
