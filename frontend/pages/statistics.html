<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">数据统计</h2>

<div class="charts-grid">
    <div class="card"><div class="card-header"><h3><i data-lucide="bar-chart-3" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>近30天能耗趋势</h3></div><div class="card-body"><div id="energyTrend" style="height:350px"></div></div></div>
    <div class="card"><div class="card-header"><h3><i data-lucide="lightbulb" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>设备类型统计</h3></div><div class="card-body"><div id="deviceChart" style="height:350px"></div></div></div>
</div>
        </div>
    </main>
</div>
<script src="../js/vendor/lucide.min.js"></script>
<script src="../js/api.js?v=20260425b"></script>
<script src="../js/utils.js?v=20260425b"></script>
<script>if(!initPage('statistics','数据统计'))throw'';</script>
<script src="../js/vendor/echarts.min.js"></script>
<script>
const chartInstances = [];
function emptyOpt(t='暂无数据'){return{title:{text:t,left:'center',top:'middle',textStyle:{color:'#94A3B8'}},xAxis:{show:false},yAxis:{show:false},series:[]};}

async function loadEnergyChart(){
    const chart = echarts.init(document.getElementById('energyTrend'));
    chartInstances.push(chart);
    try{
        const res = await statsApi.energyDaily();
        const list = Array.isArray(res.data)?res.data:[];
        if(!list.length) return chart.setOption(emptyOpt());
        chart.setOption({
            tooltip:{trigger:'axis',formatter:'{b}<br/>能耗: {c} kWh'},
            grid:{left:50,right:20,top:20,bottom:30},
            xAxis:{type:'category',data:list.map(d=>(d.date||'').slice(5)),axisLabel:{color:'#64748B'}},
            yAxis:{type:'value',name:'kWh',splitLine:{lineStyle:{color:'#F1F5F9'}},axisLabel:{color:'#64748B'}},
            series:[{type:'line',smooth:true,data:list.map(d=>Number(d.energy||0)),lineStyle:{color:'#3B82F6',width:2.5},areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(59,130,246,0.2)'},{offset:1,color:'rgba(59,130,246,0.02)'}])},itemStyle:{color:'#3B82F6'}}]
        });
    }catch(e){chart.setOption(emptyOpt('能耗加载失败'));}
}

async function loadDeviceChart(){
    const chart = echarts.init(document.getElementById('deviceChart'));
    chartInstances.push(chart);
    try{
        const res = await statsApi.deviceByType();
        const list = Array.isArray(res.data)?res.data:[];
        if(!list.length) return chart.setOption(emptyOpt());
        chart.setOption({
            tooltip:{trigger:'axis'},
            grid:{left:60,right:20,top:20,bottom:30},
            xAxis:{type:'category',data:list.map(d=>d.lampType||'未知'),axisLabel:{color:'#64748B'}},
            yAxis:{type:'value',splitLine:{lineStyle:{color:'#F1F5F9'}},axisLabel:{color:'#64748B'}},
            series:[{type:'bar',data:list.map(d=>d.count),barWidth:40,itemStyle:{borderRadius:[6,6,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#1B3A5C'},{offset:1,color:'#2A5580'}])}}]
        });
    }catch(e){chart.setOption(emptyOpt('设备加载失败'));}
}

window.addEventListener('resize',()=>chartInstances.forEach(c=>c.resize()));
loadEnergyChart();
loadDeviceChart();
</script>
</body>
</html>
