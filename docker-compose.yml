name: smartlight

services:
  # ========== MySQL ==========
  mysql:
    image: mysql:8.0
    container_name: smartlight-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_streetlight
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/swim-admin/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend/swim-admin/sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # ========== Backend (Spring Boot) ==========
  backend:
    container_name: smartlight-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai

  # ========== Frontend (Nginx) ==========
  frontend:
    container_name: smartlight-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
