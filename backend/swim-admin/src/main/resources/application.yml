server:
  port: 8080

spring:
  application:
    name: smart-streetlight
  datasource:
    url: jdbc:mysql://localhost:3306/smart_streetlight?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ab123168
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

# JWT 配置
jwt:
  secret: SmartStreetLightSystemSecretKey2024ForJWTTokenGenerationAndValidation
  expiration: 86400000  # 24小时

# 文件上传配置
upload:
  path: ./uploads
  base-url: http://localhost:8080/uploads

# MQTT 物联网通信配置
mqtt:
  enabled: false  # 设为 true 并配置 broker 后启用实际 MQTT 连接
  broker-url: tcp://localhost:1883
  client-id: smart-streetlight-server
  username: ""
  password: ""

# 日志
logging:
  level:
    com.smartlight: debug
    org.springframework.security: info
