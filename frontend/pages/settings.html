<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统设置 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .setting-group { margin-bottom: 24px; }
        .setting-group-title {
            font-size: 14px; font-weight: 600; color: #1E293B;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }
        .setting-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: start;
            padding: 14px;
            background: var(--bg-light);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .setting-key { font-family: ui-monospace, Menlo, monospace; font-size: 12.5px; color: #475569; word-break: break-all; }
        .setting-desc { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">系统设置</h2>

<div class="card">
    <div class="card-header">
        <h3>运行参数</h3>
        <button class="btn btn-outline btn-sm" onclick="loadSettings()"><i data-lucide="refresh-cw" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:3px"></i>刷新</button>
    </div>
    <div class="card-body" id="settingsBody">
        <div class="loading"><div class="spinner"></div></div>
    </div>
</div>
        </div>
    </main>
</div>
<script src="../js/vendor/lucide.min.js"></script>
<script src="../js/api.js?v=20260425b"></script>
<script src="../js/utils.js?v=20260425b"></script>
<script>if(!initPage('settings','系统设置'))throw'';</script>
<script>
const CATEGORY_LABELS = {
    energy: '能耗配置',
    general: '通用配置'
};

const HINTS = {
    'energy.kwh_per_minute': '每盏亮灯每分钟累计的电量(kWh)。能耗累计服务每 60 秒扫描一次，修改后下一次累计即生效。参考: 100W 路灯 1 小时 = 0.1 kWh，即每分钟约 0.00167 kWh。'
};

async function loadSettings() {
    const body = document.getElementById('settingsBody');
    body.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    try {
        const res = await settingsApi.list();
        const list = res.data || [];
        if (list.length === 0) {
            body.innerHTML = '<p class="text-muted">暂无可配置项。</p>';
            return;
        }
        // Group by category
        const groups = {};
        for (const s of list) {
            const cat = s.category || 'general';
            if (!groups[cat]) groups[cat] = [];
            groups[cat].push(s);
        }
        let html = '';
        for (const cat of Object.keys(groups)) {
            const label = CATEGORY_LABELS[cat] || cat;
            html += `<div class="setting-group">
                <div class="setting-group-title">${escapeHtml(label)}</div>`;
            for (const s of groups[cat]) {
                const hint = HINTS[s.key] || '';
                html += `<div class="setting-row">
                    <div>
                        <div class="setting-key">${escapeHtml(s.key)}</div>
                        <div class="setting-desc">${escapeHtml(s.description || '')}</div>
                        ${hint ? `<div class="setting-desc" style="color:#0ea5e9;margin-top:6px">${escapeHtml(hint)}</div>` : ''}
                    </div>
                    <div>
                        <input class="form-input" id="val_${s.id}" value="${escapeHtml(s.value)}">
                    </div>
                    <div>
                        <button class="btn btn-primary btn-sm" onclick="saveSetting('${escapeHtml(s.key)}', ${s.id})">保存</button>
                    </div>
                </div>`;
            }
            html += '</div>';
        }
        body.innerHTML = html;
    } catch(err) {
        body.innerHTML = `<p style="color:var(--danger)">加载失败: ${escapeHtml(err.message)}</p>`;
    }
}

async function saveSetting(key, id) {
    const input = document.getElementById('val_' + id);
    const value = input.value.trim();
    if (!value) { showToast('值不能为空', 'warning'); return; }
    try {
        await settingsApi.update(key, { value });
        showToast('保存成功', 'success');
    } catch(err) {
        showToast(err.message, 'error');
    }
}

loadSettings();
</script>
</body>
</html>
