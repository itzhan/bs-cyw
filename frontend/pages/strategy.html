<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>策略管理 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">策略管理</h2>
            
<div class="card">
    <div class="card-header"><h3>控制策略</h3><button class="btn btn-primary btn-sm" onclick="openCreate()" id="createBtn">+ 新建策略</button></div>
    <div class="card-body">
        <div class="search-bar">
            <select class="form-select" id="filterType" style="width:120px" onchange="loadStrategies()"><option value="">全部类型</option><option value="1">定时策略</option><option value="2">光控策略</option><option value="3">节假日策略</option><option value="4">人流策略</option></select>
            <select class="form-select" id="filterStatus" style="width:120px" onchange="loadStrategies()"><option value="">全部状态</option><option value="1">启用</option><option value="0">禁用</option></select>
        </div>
        <div class="table-container"><table class="data-table"><thead><tr><th>名称</th><th>类型</th><th>开始时间</th><th>结束时间</th><th>亮度</th><th>范围</th><th>阶段</th><th>状态</th><th>操作</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="9"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div>
        <div id="pagination"></div>
    </div>
</div>
<div class="modal-overlay" id="createModal"><div class="modal" style="max-width:600px">
    <div class="modal-header"><h3 id="formTitle">新建策略</h3><button class="modal-close" onclick="closeModal('createModal')">✕</button></div>
    <div class="modal-body">
        <div class="form-group"><label class="form-label">策略名称</label><input class="form-input" id="csName" required></div>
        <div class="grid-2">
            <div class="form-group"><label class="form-label">类型</label><select class="form-select" id="csType"><option value="1">定时策略</option><option value="2">光控策略</option><option value="3">节假日策略</option><option value="4">人流策略</option></select></div>
            <div class="form-group"><label class="form-label">优先级</label><input class="form-input" id="csPriority" type="number" value="5"></div>
        </div>
        <div class="grid-2">
            <div class="form-group"><label class="form-label">开始时间 (年月日时分) *</label><input class="form-input" id="csStart" type="datetime-local"></div>
            <div class="form-group"><label class="form-label">结束时间 (年月日时分)</label><input class="form-input" id="csEnd" type="datetime-local"></div>
        </div>
        <div class="grid-2">
            <div class="form-group"><label class="form-label">亮度(% , 0=关灯)</label><input class="form-input" id="csBrightness" type="number" min="0" max="100" value="100"></div>
            <div class="form-group"><label class="form-label">适用范围</label><select class="form-select" id="csArea"><option value="">全局(所有路灯)</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">描述</label><textarea class="form-textarea" id="csDesc"></textarea></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('createModal')">取消</button><button class="btn btn-primary" onclick="submitForm()">保存</button></div>
</div></div>
<div class="modal-overlay" id="deleteModal"><div class="modal" style="max-width:380px">
    <div class="modal-header"><h3>确认删除</h3><button class="modal-close" onclick="closeModal('deleteModal')">✕</button></div>
    <div class="modal-body"><p>确定要删除该策略吗？此操作不可恢复。</p></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('deleteModal')">取消</button><button class="btn btn-danger" onclick="confirmDelete()">删除</button></div>
</div></div>
        </div>
    </main>
</div>
<script src="../js/vendor/lucide.min.js"></script>
<script src="../js/api.js?v=20260425b"></script>
<script src="../js/utils.js?v=20260425b"></script>
<script>if(!initPage('strategy','策略管理'))throw'';</script>
<script>
let currentPage=1, editId=null, deleteId=null;

function fmtDt(dt){ if(!dt) return '-'; return String(dt).replace('T',' ').substring(0,16); }
function toLocalInput(dt){ if(!dt) return ''; return String(dt).replace(' ','T').substring(0,16); }
function phaseTag(p){ const m={0:['未开始','tag-default'],1:['执行中','tag-warning'],2:['已结束','tag-success']}; const [t,c]=m[p||0]; return `<span class="tag ${c}">${t}</span>`; }

async function loadAreas(){
  try{
    const res = await areaApi.list();
    const sel = document.getElementById('csArea');
    sel.innerHTML = '<option value="">全局(所有路灯)</option>' + (res.data||[]).map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  }catch(e){}
}

async function loadStrategies(page){currentPage=page||1;try{
const res=await strategyApi.list({page:currentPage,size:10,type:document.getElementById('filterType').value,status:document.getElementById('filterStatus').value});const d=res.data;
document.getElementById('tableBody').innerHTML=d.records.map(s=>`<tr><td>${s.name}</td><td>${(STATUS_MAP.strategyType&&STATUS_MAP.strategyType[s.type])||s.type}</td><td>${fmtDt(s.startDatetime)}</td><td>${fmtDt(s.endDatetime)}</td><td>${s.brightness!=null?s.brightness+'%':'-'}</td><td>${s.areaId?('区域'+s.areaId):'全局'}</td><td>${phaseTag(s.lastPhase)}</td><td><span class="tag ${s.status===1?'tag-success':'tag-default'}">${s.status===1?'启用':'禁用'}</span></td><td style="white-space:nowrap"><button class="btn btn-outline btn-sm" onclick="openEdit(${s.id})">编辑</button> <button class="btn btn-sm ${s.status===1?'btn-warning':'btn-success'}" onclick="toggleStrategy(${s.id})">${s.status===1?'禁用':'启用'}</button> <button class="btn btn-danger btn-sm" onclick="openDelete(${s.id})">删除</button></td></tr>`).join('')||'<tr><td colspan="9" class="text-center text-muted">暂无策略</td></tr>';
renderPagination('pagination',d.total,d.page,d.size,loadStrategies);}catch(err){showToast(err.message,'error');}}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function clearForm(){document.getElementById('csName').value='';document.getElementById('csType').value='1';document.getElementById('csPriority').value='5';document.getElementById('csStart').value='';document.getElementById('csEnd').value='';document.getElementById('csBrightness').value='100';document.getElementById('csDesc').value='';document.getElementById('csArea').value='';}
function openCreate(){editId=null;clearForm();document.getElementById('formTitle').textContent='新建策略';document.getElementById('createModal').classList.add('show');}
async function openEdit(id){try{const res=await strategyApi.detail(id);const s=res.data;editId=id;document.getElementById('formTitle').textContent='编辑策略';document.getElementById('csName').value=s.name||'';document.getElementById('csType').value=String(s.type||1);document.getElementById('csPriority').value=s.priority||5;document.getElementById('csStart').value=toLocalInput(s.startDatetime);document.getElementById('csEnd').value=toLocalInput(s.endDatetime);document.getElementById('csBrightness').value=s.brightness!=null?s.brightness:100;document.getElementById('csDesc').value=s.description||'';document.getElementById('csArea').value=s.areaId||'';document.getElementById('createModal').classList.add('show');}catch(err){showToast(err.message,'error');}}
async function toggleStrategy(id){try{await strategyApi.toggle(id);showToast('操作成功','success');loadStrategies(currentPage);}catch(err){showToast(err.message,'error');}}
async function submitForm(){
  const startVal = document.getElementById('csStart').value;
  if(!document.getElementById('csName').value){showToast('策略名称不能为空','warning');return;}
  if(!startVal){showToast('请选择开始时间(年月日时分)','warning');return;}
  const areaVal = document.getElementById('csArea').value;
  const data={
    name:document.getElementById('csName').value,
    type:parseInt(document.getElementById('csType').value),
    actionType:1,
    startDatetime: startVal.replace('T',' ')+':00',
    endDatetime: document.getElementById('csEnd').value ? document.getElementById('csEnd').value.replace('T',' ')+':00' : null,
    brightness:parseInt(document.getElementById('csBrightness').value),
    priority:parseInt(document.getElementById('csPriority').value),
    description:document.getElementById('csDesc').value,
    areaId: areaVal? parseInt(areaVal): null,
    status:1
  };
  try{if(editId){await strategyApi.update(editId,data);showToast('编辑成功','success');}else{await strategyApi.create(data);showToast('创建成功','success');}closeModal('createModal');loadStrategies(currentPage);}catch(err){showToast(err.message,'error');}
}
function openDelete(id){deleteId=id;document.getElementById('deleteModal').classList.add('show');}
async function confirmDelete(){try{await strategyApi.delete(deleteId);showToast('删除成功','success');closeModal('deleteModal');loadStrategies(currentPage);}catch(err){showToast(err.message,'error');}}
loadAreas();
loadStrategies();
</script>
</body>
</html>
