<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon"><i data-lucide="lamp" style="width:28px;height:28px;color:#fff"></i></div>
                <h2>用户注册</h2>
                <p>创建您的账户</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="username" placeholder="3-50位字符" required minlength="3" maxlength="50">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="password" placeholder="6-30位字符" required minlength="6" maxlength="30">
                </div>
                <div class="form-group">
                    <label class="form-label">真实姓名</label>
                    <input type="text" class="form-input" id="realName" placeholder="请输入真实姓名">
                </div>
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <input type="tel" class="form-input" id="phone" placeholder="请输入手机号">
                </div>
                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" class="form-input" id="email" placeholder="请输入邮箱">
                </div>
                <div class="form-group" style="margin-top:24px">
                    <button type="submit" class="btn btn-primary" id="registerBtn">注 册</button>
                </div>
            </form>
            <div class="auth-footer">
                已有账号？<a href="login.html">返回登录</a>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        if (window.lucide) lucide.createIcons();
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.disabled = true;
            btn.textContent = '注册中...';
            try {
                await authApi.register({
                    username: document.getElementById('username').value,
                    password: document.getElementById('password').value,
                    realName: document.getElementById('realName').value,
                    phone: document.getElementById('phone').value,
                    email: document.getElementById('email').value
                });
                showToast('注册成功，跳转登录...', 'success');
                setTimeout(() => location.href = 'login.html', 1000);
            } catch (err) {
                showToast(err.message, 'error');
                btn.disabled = false;
                btn.textContent = '注 册';
            }
        });
    </script>
</body>
</html>
