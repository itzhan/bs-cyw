<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电柜管理 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">

</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">电柜管理</h2>

<div class="card">
    <div class="card-header">
        <h3>电柜列表</h3>
        <button class="btn btn-primary btn-sm" id="addBtn" onclick="openCreate()" style="display:none">+ 新增电柜</button>
    </div>
    <div class="card-body">
        <div class="search-bar"><div class="search-input-wrapper"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜索电柜..." onkeyup="if(event.key==='Enter')loadCabinets()"></div><button class="btn btn-primary btn-sm" onclick="loadCabinets()">查询</button></div>
        <div class="table-container"><table class="data-table"><thead><tr><th>编码</th><th>名称</th><th>地址</th><th>容量(路灯)</th><th>状态</th><th>安装日期</th><th>操作</th></tr></thead>
        <tbody id="cabinetTableBody"><tr><td colspan="7"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div>
        <div id="pagination"></div>
    </div>
</div>

<!-- 表单弹窗 -->
<div class="modal-overlay" id="formModal">
    <div class="modal" style="max-width:640px">
        <div class="modal-header"><h3 id="formTitle">新增电柜</h3><button class="modal-close" onclick="closeModal('formModal')">✕</button></div>
        <div class="modal-body">
            <div class="grid-2">
                <div class="form-group"><label class="form-label">编码 *</label><input class="form-input" id="fCode"></div>
                <div class="form-group"><label class="form-label">名称 *</label><input class="form-input" id="fName"></div>
                <div class="form-group"><label class="form-label">所属区域 *</label><select class="form-select" id="fAreaId"></select></div>
                <div class="form-group"><label class="form-label">容量(路灯)</label><input class="form-input" id="fCapacity" type="number"></div>
                <div class="form-group"><label class="form-label">经度</label><input class="form-input" id="fLongitude" type="number" step="0.0000001"></div>
                <div class="form-group"><label class="form-label">纬度</label><input class="form-input" id="fLatitude" type="number" step="0.0000001"></div>
                <div class="form-group"><label class="form-label">状态</label><select class="form-select" id="fStatus"><option value="1">正常</option><option value="0">故障</option><option value="2">维护中</option></select></div>
                <div class="form-group"><label class="form-label">安装日期</label><input class="form-input" id="fInstallDate" type="date"></div>
            </div>
            <div class="form-group"><label class="form-label">地址</label><input class="form-input" id="fAddress"></div>
        </div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('formModal')">取消</button><button class="btn btn-primary" onclick="submitForm()">保存</button></div>
    </div>
</div>

<!-- 删除确认 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width:380px">
        <div class="modal-header"><h3>确认删除</h3><button class="modal-close" onclick="closeModal('deleteModal')">✕</button></div>
        <div class="modal-body"><p>确定要删除该电柜吗？此操作不可恢复。</p></div>
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('deleteModal')">取消</button><button class="btn btn-danger" onclick="confirmDelete()">删除</button></div>
    </div>
</div>
        </div>
    </main>
</div>
<script src="../js/vendor/lucide.min.js"></script>
<script src="../js/api.js?v=20260425b"></script>
<script src="../js/utils.js?v=20260425b"></script>
<script>if(!initPage('cabinet','电柜管理'))throw'';</script>
<script>
let currentPage=1, editId=null, deleteId=null, allAreas=[];
const isAdmin = hasRole('ADMIN');
const isOperator = hasRole('OPERATOR');
if (isAdmin) document.getElementById('addBtn').style.display = '';

async function loadAreas(){
    try { const r = await areaApi.list(); allAreas = r.data || [];
        document.getElementById('fAreaId').innerHTML = '<option value="">请选择</option>' + allAreas.map(a => `<option value="${a.id}">${a.name} (${a.code})</option>`).join('');
    } catch(e){ console.warn(e); }
}
loadAreas();

async function loadCabinets(page){
    currentPage = page || 1;
    try {
        const res = await cabinetApi.list({page:currentPage,size:10,keyword:document.getElementById('searchInput').value});
        const d = res.data;
        document.getElementById('cabinetTableBody').innerHTML = d.records.map(c => {
            let actions = '';
            if (isAdmin || isOperator) actions += `<button class="btn btn-outline btn-sm" onclick="openEdit(${c.id})">编辑</button>`;
            if (isAdmin) actions += ` <button class="btn btn-danger btn-sm" onclick="openDelete(${c.id})">删除</button>`;
            if (!actions) actions = '-';
            return `<tr>
                <td><code>${c.code}</code></td>
                <td>${c.name}</td>
                <td>${c.address||'-'}</td>
                <td>${c.capacity||'-'}</td>
                <td>${statusTag('cabinetStatus',c.status)}</td>
                <td>${c.installDate||'-'}</td>
                <td style="white-space:nowrap">${actions}</td>
            </tr>`;
        }).join('') || '<tr><td colspan="7" class="text-center text-muted">暂无数据</td></tr>';
        renderPagination('pagination', d.total, d.page, d.size, loadCabinets);
    } catch(err){ showToast(err.message,'error'); }
}

function closeModal(id){ document.getElementById(id).classList.remove('show'); }

function clearForm(){
    ['fCode','fName','fCapacity','fLongitude','fLatitude','fInstallDate','fAddress'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fStatus').value = '1';
    document.getElementById('fAreaId').value = '';
}

function openCreate(){
    editId = null; clearForm();
    document.getElementById('formTitle').textContent = '新增电柜';
    document.getElementById('fCode').readOnly = false;
    document.getElementById('formModal').classList.add('show');
}

async function openEdit(id){
    try {
        const res = await cabinetApi.detail(id);
        const c = res.data;
        editId = id;
        document.getElementById('formTitle').textContent = '编辑电柜';
        document.getElementById('fCode').value = c.code || '';
        document.getElementById('fCode').readOnly = true;
        document.getElementById('fName').value = c.name || '';
        document.getElementById('fAreaId').value = c.areaId || '';
        document.getElementById('fCapacity').value = c.capacity || '';
        document.getElementById('fLongitude').value = c.longitude || '';
        document.getElementById('fLatitude').value = c.latitude || '';
        document.getElementById('fStatus').value = String(c.status);
        document.getElementById('fInstallDate').value = c.installDate ? String(c.installDate).substring(0,10) : '';
        document.getElementById('fAddress').value = c.address || '';
        document.getElementById('formModal').classList.add('show');
    } catch(err){ showToast(err.message,'error'); }
}

async function submitForm(){
    const code = document.getElementById('fCode').value.trim();
    const name = document.getElementById('fName').value.trim();
    const areaId = document.getElementById('fAreaId').value;
    if (!code || !name){ showToast('编码和名称为必填项','warning'); return; }
    if (!areaId){ showToast('请选择所属区域','warning'); return; }
    const data = {
        code, name,
        areaId: parseInt(areaId),
        capacity: document.getElementById('fCapacity').value ? parseInt(document.getElementById('fCapacity').value) : null,
        longitude: document.getElementById('fLongitude').value ? parseFloat(document.getElementById('fLongitude').value) : null,
        latitude: document.getElementById('fLatitude').value ? parseFloat(document.getElementById('fLatitude').value) : null,
        status: parseInt(document.getElementById('fStatus').value),
        installDate: document.getElementById('fInstallDate').value || null,
        address: document.getElementById('fAddress').value.trim() || null
    };
    try {
        if (editId) { await cabinetApi.update(editId, data); showToast('编辑成功','success'); }
        else { await cabinetApi.create(data); showToast('新增成功','success'); }
        closeModal('formModal');
        loadCabinets(currentPage);
    } catch(err){ showToast(err.message,'error'); }
}

function openDelete(id){ deleteId = id; document.getElementById('deleteModal').classList.add('show'); }
async function confirmDelete(){
    try { await cabinetApi.delete(deleteId); showToast('删除成功','success'); closeModal('deleteModal'); loadCabinets(currentPage); }
    catch(err){ showToast(err.message,'error'); }
}

loadCabinets();
</script>
</body>
</html>
