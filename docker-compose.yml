name: smartlight-csharp-c

services:
  mysql:
    image: mysql:8.0
    container_name: smartlight-csharp-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smart_streetlight
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql_data_csharp:/var/lib/mysql
      - ./database/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./database/sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  mqtt:
    image: eclipse-mosquitto:2
    container_name: smartlight-csharp-mqtt
    restart: unless-stopped
    ports:
      - "1884:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  db-init:
    image: mysql:8.0
    container_name: smartlight-csharp-db-init
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./database/sql/init.sql:/sql/init.sql:ro
      - ./database/sql/data.sql:/sql/data.sql:ro
      - ./database/sql/migration_v2.sql:/sql/migration_v2.sql:ro
      - ./database/sql/migration_v3.sql:/sql/migration_v3.sql:ro
      - ./database/ensure-data.sh:/ensure-data.sh:ro
    # 把脚本里可能被 Windows 改成 CRLF 的 \r 剥掉再执行,防止 Windows 用户 git clone 时脚本跑不起来
    entrypoint: ["bash", "-c", "sed 's/\\r$//' /ensure-data.sh | bash"]
    restart: "no"

  backend:
    container_name: smartlight-csharp-backend
    build:
      context: .
      dockerfile: Dockerfile.backend-csharp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      mqtt:
        condition: service_started
    environment:
      TZ: Asia/Shanghai
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=smart_streetlight;User=root;Password=root123;CharSet=utf8mb4;
      Mqtt__Enabled: "true"
      Mqtt__BrokerUrl: mqtt
      Mqtt__BrokerPort: "1883"
      Mqtt__ClientId: smart-streetlight-server-csharp

  frontend:
    container_name: smartlight-csharp-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "3010:80"
    depends_on:
      - backend

  sim-device-1:
    container_name: smartlight-c-sim-1
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mqtt
    command: ["tcp://mqtt:1883", "DEV-HYL-001"]

  sim-device-2:
    container_name: smartlight-c-sim-2
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mqtt
    command: ["tcp://mqtt:1883", "DEV-HYL-002"]

  sim-device-3:
    container_name: smartlight-c-sim-3
    build:
      context: ./device-simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - mqtt
    command: ["tcp://mqtt:1883", "DEV-JSL-014"]

volumes:
  mysql_data_csharp:
