<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备地图 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .map-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .map-stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-sm);
            font-size: 13px;
        }
        .map-stat-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .map-stat-item strong {
            font-size: 18px;
            margin-left: 4px;
        }
        .map-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .map-card {
            height: calc(100vh - 220px);
            min-height: 500px;
        }
        .map-card .card-body {
            padding: 0;
            height: calc(100% - 52px);
        }
        #mapContainer {
            width: 100%;
            height: 100%;
            border-radius: 0 0 12px 12px;
        }
        /* AMap info window custom style */
        .amap-info-window {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .map-popup {
            min-width: 260px;
            padding: 16px;
        }
        .map-popup-title {
            font-size: 15px;
            font-weight: 600;
            color: #1E293B;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .map-popup-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 12.5px;
            border-bottom: 1px dashed #f1f5f9;
        }
        .map-popup-row:last-child { border-bottom: none; }
        .map-popup-label {
            color: #64748B;
        }
        .map-popup-value {
            color: #1E293B;
            font-weight: 500;
        }
        .map-legend {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .edit-mode-banner {
            display: none;
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(239, 68, 68, 0.95);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }
        .edit-mode-banner.show { display: block; }
        .btn-edit-active {
            background: #EF4444 !important;
            color: #fff !important;
            border-color: #EF4444 !important;
        }
        .edit-pending-hint {
            display: none;
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 21;
            background: #F59E0B;
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            box-shadow: 0 4px 12px rgba(245,158,11,0.35);
            pointer-events: none; /* 不挡地图点击 */
        }
        .edit-mode-banner { pointer-events: none; }
        @keyframes pendingPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">设备地图</h2>

            <!-- Statistics Bar -->
            <div class="map-stats" id="mapStats">
                <div class="map-stat-item">
                    <div class="map-stat-dot" style="background:var(--primary)"></div>
                    <span>设备总数</span><strong id="statTotal">-</strong>
                </div>
                <div class="map-stat-item">
                    <div class="map-stat-dot" style="background:var(--success)"></div>
                    <span>在线正常</span><strong id="statOnline">-</strong>
                </div>
                <div class="map-stat-item">
                    <div class="map-stat-dot" style="background:var(--danger)"></div>
                    <span>故障</span><strong id="statFault">-</strong>
                </div>
                <div class="map-stat-item">
                    <div class="map-stat-dot" style="background:var(--text-muted)"></div>
                    <span>离线</span><strong id="statOffline">-</strong>
                </div>
                <div class="map-stat-item">
                    <div class="map-stat-dot" style="background:var(--warning)"></div>
                    <span>维护中</span><strong id="statMaint">-</strong>
                </div>
            </div>

            <!-- Map Card -->
            <div class="card map-card">
                <div class="card-header">
                    <h3><i data-lucide="map" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>设备地图监控</h3>
                    <div class="map-toolbar">
                        <div class="map-legend">
                            <div class="legend-item"><div class="legend-dot" style="background:#10B981"></div>在线正常</div>
                            <div class="legend-item"><div class="legend-dot" style="background:#EF4444"></div>故障</div>
                            <div class="legend-item"><div class="legend-dot" style="background:#94A3B8"></div>离线</div>
                            <div class="legend-item"><div class="legend-dot" style="background:#F59E0B"></div>维护中</div>
                        </div>
                        <select class="form-select" style="width:130px;padding:6px 10px;font-size:12px" id="filterStatus" onchange="filterMarkers()">
                            <option value="all">全部状态</option>
                            <option value="online">在线正常</option>
                            <option value="fault">故障</option>
                            <option value="offline">离线</option>
                            <option value="maintain">维护中</option>
                        </select>
                        <button class="btn btn-outline btn-sm" id="btnEditMode" onclick="toggleEditMode()" style="padding:6px 12px;font-size:12px;display:none"><i data-lucide="move" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:3px"></i>编辑坐标</button>
                        <button class="btn btn-outline btn-sm" onclick="refreshMapData()" style="padding:6px 12px;font-size:12px"><i data-lucide="refresh-cw" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:3px"></i>刷新数据</button>
                    </div>
                </div>
                <div class="card-body" style="position:relative">
                    <div id="editModeBanner" class="edit-mode-banner">🛠 编辑模式 · 点击路灯标记选中，再点地图新位置即可保存</div>
                    <div id="editPendingHint" class="edit-pending-hint"></div>
                    <div id="mapContainer"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- AMap JS API v2 with security key -->
<script>
    window._AMapSecurityConfig = {
        securityJsCode: '829df186fd14a91f24aa94f21b6b9964'
    };
</script>
<script src="https://webapi.amap.com/maps?v=2.0&key=233f28b114cbe6fde30008428445f96f&plugin=AMap.Scale,AMap.ToolBar"></script>
<script src="../js/vendor/lucide.min.js"></script>
<script src="../js/api.js?v=20260425b"></script>
<script src="../js/utils.js?v=20260425b"></script>
<script>if(!initPage('map','设备地图'))throw'';</script>
<script>
(function() {
    // Global state
    var map = null;
    var markers = [];
    var allLights = [];
    var infoWindow = null;
    var editMode = false;
    var isAdmin = hasRole('ADMIN');
    var pendingLight = null;     // 当前已选中、等待落点的路灯
    var pendingMarker = null;    // 对应的 marker
    var lastMarkerClickTime = 0; // 防 marker 点击立刻触发 map 点击

    // Show edit-mode button only for admin
    if (isAdmin) {
        var btn = document.getElementById('btnEditMode');
        if (btn) btn.style.display = '';
    }

    // Color mapping for device status (0-5 per schema)
    var STATUS_COLORS = {
        0: '#EF4444',  // 故障 - red
        1: '#10B981',  // 在线正常 - green
        2: '#F59E0B',  // 在线异常 - orange
        3: '#94A3B8',  // 离线 - gray
        4: '#F59E0B',  // 待检修 - orange
        5: '#94A3B8'   // 暂停运行 - gray
    };

    var DEVICE_STATUS_TEXT = {
        0: '故障', 1: '在线正常', 2: '在线异常', 3: '离线', 4: '待检修', 5: '暂停运行'
    };

    // 真实呈现颜色
    function resolveColor(l){
        if (l.deviceStatus === 0) return '#EF4444';           // 故障优先红
        if (l.onlineStatus === 0) return '#94A3B8';           // 离线灰
        if (l.lightStatus === 0) return '#94A3B8';            // 关灯 → 灰
        if (l.deviceStatus === 4 || l.deviceStatus === 2) return '#F59E0B'; // 维护/异常
        if (l.deviceStatus === 5) return '#94A3B8';
        return '#10B981';                                       // 亮灯+在线正常 = 绿
    }

    // Build info window content
    function buildInfoContent(light) {
        var statusColor = STATUS_COLORS[light.deviceStatus] || '#94A3B8';
        var statusText = DEVICE_STATUS_TEXT[light.deviceStatus] || '未知';
        var onlineText = light.onlineStatus === 1 ? '在线' : '离线';
        var onlineColor = light.onlineStatus === 1 ? '#10B981' : '#94A3B8';
        var lightText = light.lightStatus === 1 ? '亮灯' : '关灯';
        var lightColor = light.lightStatus === 1 ? '#F59E0B' : '#64748B';

        return '<div class="map-popup">' +
            '<div class="map-popup-title">' +
                '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:' + statusColor + '"></span> ' +
                light.code + ' · ' + light.name +
            '</div>' +
            '<div class="map-popup-row"><span class="map-popup-label">设备状态</span><span class="map-popup-value" style="color:' + statusColor + '">' + statusText + '</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">网络状态</span><span class="map-popup-value" style="color:' + onlineColor + '">' + onlineText + '</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">灯光状态</span><span class="map-popup-value" style="color:' + lightColor + '">' + lightText + '</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">亮度</span><span class="map-popup-value">' + (light.brightness || 0) + '%</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">功率</span><span class="map-popup-value">' + (light.power || '-') + ' W</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">灯型</span><span class="map-popup-value">' + (light.lampType || '-') + '</span></div>' +
            '<div class="map-popup-row"><span class="map-popup-label">地址</span><span class="map-popup-value">' + (light.address || '-') + '</span></div>' +
            (light.longitude ? '<div class="map-popup-row"><span class="map-popup-label">经纬度</span><span class="map-popup-value">' + Number(light.longitude).toFixed(5) + ', ' + Number(light.latitude).toFixed(5) + '</span></div>' : '') +
        '</div>';
    }

    // Robustly read {lng, lat} as numbers from an AMap LngLat (works whether lng/lat are
    // properties, getter functions, or only available via getLng()/getLat()).
    function readLngLat(e, m) {
        var pos = (e && e.lnglat) || (m && m.getPosition && m.getPosition());
        if (!pos) return null;
        var lng = (typeof pos.getLng === 'function') ? pos.getLng()
                : (typeof pos.lng === 'function') ? pos.lng()
                : pos.lng;
        var lat = (typeof pos.getLat === 'function') ? pos.getLat()
                : (typeof pos.lat === 'function') ? pos.lat()
                : pos.lat;
        lng = Number(lng); lat = Number(lat);
        if (!isFinite(lng) || !isFinite(lat)) return null;
        return { lng: Number(lng.toFixed(7)), lat: Number(lat.toFixed(7)) };
    }

    // Build HTML content for an edit-mode marker (selected = highlighted ring + scale)
    function buildMarkerHtml(color, isLit, selected) {
        var size = isLit ? 22 : 18;
        if (selected) size += 8;
        var opacity = selected ? 1 : (isLit ? 0.9 : 0.6);
        var ring = selected ? 'box-shadow:0 0 0 4px rgba(245,158,11,0.5),0 4px 12px rgba(0,0,0,0.5);' : 'box-shadow:0 2px 6px rgba(0,0,0,0.4);';
        var border = selected ? '3px solid #F59E0B' : '2px solid #fff';
        return '<div style="width:' + size + 'px;height:' + size + 'px;border-radius:50%;'
             + 'background:' + color + ';opacity:' + opacity + ';'
             + 'border:' + border + ';' + ring
             + 'cursor:pointer;pointer-events:auto;'
             + (selected ? 'animation:pendingPulse 1.2s ease-in-out infinite;' : '')
             + '"></div>';
    }

    // Direct fetch — 不依赖 lightApi(避免 api.js 旧版缓存导致 updateLocation 不存在)
    function callUpdateLocation(id, lng, lat) {
        var token = localStorage.getItem('token');
        var apiBase = location.port === '3000' ? 'http://localhost:8080/api' : '/api';
        return fetch(apiBase + '/streetlights/' + id + '/location', {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': token ? 'Bearer ' + token : ''
            },
            body: JSON.stringify({ longitude: lng, latitude: lat })
        }).then(function(r) {
            if (r.status === 401) throw new Error('登录已过期');
            return r.json();
        }).then(function(d) {
            if (d.code !== 200) throw new Error(d.message || '保存失败');
            return d;
        });
    }

    // Save the pending light to a new lng/lat
    function savePendingLocation(lng, lat) {
        if (!pendingLight) return;
        var l = pendingLight;
        console.log('[Map] saving', l.id, lng, lat);
        var prevLng = l.longitude, prevLat = l.latitude;
        if (pendingMarker && pendingMarker.setPosition) {
            try { pendingMarker.setPosition(new AMap.LngLat(lng, lat)); } catch(_){}
        }
        callUpdateLocation(l.id, lng, lat).then(function() {
            showToast('已保存: ' + l.name + ' (' + lng + ', ' + lat + ')', 'success', 2500);
            l.longitude = lng;
            l.latitude = lat;
            var src = allLights.find(function(a){ return a.id === l.id; });
            if (src) { src.longitude = lng; src.latitude = lat; }
            clearPending();
        }).catch(function(err) {
            console.error('[Map] save failed', err);
            showToast('保存失败: ' + err.message, 'error');
            if (pendingMarker && pendingMarker.setPosition) {
                try { pendingMarker.setPosition(new AMap.LngLat(Number(prevLng), Number(prevLat))); } catch(_){}
            }
        });
    }

    // 原地更新某个 marker 的视觉(选中/未选中),不全量重建,这样事件链不会被打断
    function paintMarker(marker, light, selected) {
        if (!marker || !marker.setContent) return;
        try {
            var color = resolveColor(light);
            var lit = light.lightStatus === 1 && light.onlineStatus === 1;
            marker.setContent(buildMarkerHtml(color, lit, selected));
            if (marker.setzIndex) marker.setzIndex(selected ? 100 : (light.deviceStatus === 0 ? 20 : 10));
            // 更新 offset 因为选中状态尺寸不同
            var baseSize = lit ? 22 : 18;
            var totalSize = selected ? baseSize + 8 + 6 : baseSize + 4;
            if (marker.setOffset) marker.setOffset(new AMap.Pixel(-totalSize/2, -totalSize/2));
        } catch (err) { console.warn('[Map] paintMarker failed', err); }
    }

    function clearPending() {
        if (pendingMarker && pendingLight) {
            paintMarker(pendingMarker, pendingLight, false);
        }
        pendingLight = null;
        pendingMarker = null;
        var hint = document.getElementById('editPendingHint');
        if (hint) hint.style.display = 'none';
    }

    function selectPending(light, marker) {
        // 取消之前选中的(原地刷视觉)
        if (pendingMarker && pendingLight && pendingLight.id !== light.id) {
            paintMarker(pendingMarker, pendingLight, false);
        }
        pendingLight = light;
        pendingMarker = marker;
        paintMarker(marker, light, true);
        var hint = document.getElementById('editPendingHint');
        if (hint) {
            hint.innerHTML = '✓ 已选中 <strong>' + light.name + '</strong>，请在地图上点击新位置（再点该标记取消）';
            hint.style.display = 'block';
        }
    }

    // Add markers to map (CircleMarker for view mode, Marker for edit mode)
    function addMarkers(lights) {
        if (markers.length) {
            map.remove(markers);
            markers = [];
        }

        for (var i = 0; i < lights.length; i++) {
            var light = lights[i];
            if (!light.longitude || !light.latitude) continue;

            var color = resolveColor(light);
            var isLit = light.lightStatus === 1 && light.onlineStatus === 1;
            var position = new AMap.LngLat(Number(light.longitude), Number(light.latitude));
            var marker;

            if (editMode) {
                var isSelected = pendingLight && pendingLight.id === light.id;
                var baseSize = isLit ? 22 : 18;
                var totalSize = isSelected ? baseSize + 8 + 6 : baseSize + 4; // +border
                marker = new AMap.Marker({
                    position: position,
                    content: buildMarkerHtml(color, isLit, isSelected),
                    offset: new AMap.Pixel(-totalSize/2, -totalSize/2),
                    draggable: true, // 留着试试,不行就用点选
                    cursor: 'pointer',
                    zIndex: isSelected ? 100 : (light.deviceStatus === 0 ? 20 : 10),
                    bubble: false
                });

                (function(l, m) {
                    // Drag fallback (works on some SDK builds)
                    m.on('dragend', function(e) {
                        console.log('[Map] dragend fired for', l.code || l.id);
                        var p = readLngLat(e, m);
                        if (!p) {
                            console.error('[Map] dragend: cannot read position', e, m.getPosition && m.getPosition());
                            return;
                        }
                        // route through the same save path
                        pendingLight = l; pendingMarker = m;
                        savePendingLocation(p.lng, p.lat);
                    });
                    // Primary mechanism: click-to-select then click-map-to-place
                    m.on('click', function(e) {
                        lastMarkerClickTime = Date.now();
                        if (pendingLight && pendingLight.id === l.id) {
                            // 二次点击同一目标 = 取消
                            console.log('[Map] cancel pending', l.id);
                            clearPending();
                            return;
                        }
                        console.log('[Map] select pending', l.id);
                        selectPending(l, m);
                    });
                })(light, marker);
            } else {
                var radius = isLit ? 10 : 7;
                marker = new AMap.CircleMarker({
                    center: position,
                    radius: radius,
                    strokeColor: color,
                    strokeWeight: 2,
                    strokeOpacity: 0.8,
                    fillColor: color,
                    fillOpacity: isLit ? 0.6 : 0.4,
                    zIndex: light.deviceStatus === 0 ? 20 : 10,
                    cursor: 'pointer',
                    bubble: false
                });

                (function(l, cm) {
                    cm.on('click', function() {
                        infoWindow.setContent(buildInfoContent(l));
                        infoWindow.open(map, new AMap.LngLat(Number(l.longitude), Number(l.latitude)));
                    });
                })(light, marker);
            }

            markers.push(marker);
        }

        map.add(markers);
        console.log('[Map] Added ' + markers.length + ' markers (editMode=' + editMode + ')');
    }

    // Toggle edit mode (admin only)
    window.toggleEditMode = function() {
        if (!isAdmin) return;
        editMode = !editMode;
        // Close any open info window so it can't intercept drag events
        if (infoWindow && infoWindow.close) { try { infoWindow.close(); } catch(_){} }
        var btn = document.getElementById('btnEditMode');
        var banner = document.getElementById('editModeBanner');
        if (editMode) {
            btn.classList.add('btn-edit-active');
            btn.innerHTML = '<i data-lucide="check" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:3px"></i>退出编辑';
            banner.classList.add('show');
            banner.innerHTML = '🛠 编辑模式 · 点击路灯标记选中，再点地图新位置即可保存（也可尝试直接拖拽）';
            showToast('已进入编辑模式：先点路灯，再点新位置', 'info', 3000);
        } else {
            pendingLight = null; pendingMarker = null;
            var hint = document.getElementById('editPendingHint');
            if (hint) hint.style.display = 'none';
            btn.classList.remove('btn-edit-active');
            btn.innerHTML = '<i data-lucide="move" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:3px"></i>编辑坐标';
            banner.classList.remove('show');
        }
        if (window.lucide) lucide.createIcons();
        // Re-render markers with new mode
        filterMarkers();
    };

    // Filter markers
    window.filterMarkers = function() {
        var filter = document.getElementById('filterStatus').value;
        var filtered = allLights;

        if (filter === 'online') filtered = allLights.filter(function(l) { return l.onlineStatus === 1 && l.deviceStatus === 1; });
        else if (filter === 'fault') filtered = allLights.filter(function(l) { return l.deviceStatus === 0; });
        else if (filter === 'offline') filtered = allLights.filter(function(l) { return l.onlineStatus === 0 || l.deviceStatus === 3; });
        else if (filter === 'maintain') filtered = allLights.filter(function(l) { return l.deviceStatus === 4 || l.deviceStatus === 2; });

        addMarkers(filtered);
    };

    // Update statistics
    function updateStats(lights) {
        document.getElementById('statTotal').textContent = lights.length;
        document.getElementById('statOnline').textContent = lights.filter(function(l) { return l.onlineStatus === 1 && l.deviceStatus === 1; }).length;
        document.getElementById('statFault').textContent = lights.filter(function(l) { return l.deviceStatus === 0; }).length;
        document.getElementById('statOffline').textContent = lights.filter(function(l) { return l.onlineStatus === 0 || l.deviceStatus === 3; }).length;
        document.getElementById('statMaint').textContent = lights.filter(function(l) { return l.deviceStatus === 4 || l.deviceStatus === 2; }).length;
    }

    // Load devices and add to map
    function loadDevices() {
        lightApi.all().then(function(res) {
            allLights = res.data || [];
            console.log('[Map] Loaded ' + allLights.length + ' devices');

            if (allLights.length > 0) {
                var f = allLights[0];
                console.log('[Map] Sample:', f.code, f.longitude, f.latitude);
            }

            updateStats(allLights);
            addMarkers(allLights);

            if (markers.length > 0 && !editMode) {
                map.setFitView(markers, false, [60, 60, 60, 60]);
            }
        }).catch(function(err) {
            console.error('[Map] Load error:', err);
            showToast('设备数据加载失败: ' + err.message, 'error');
        });
    }

    // Initialize
    console.log('[Map] Initializing AMap...');
    console.log('[Map] AMap available:', typeof AMap !== 'undefined');

    map = new AMap.Map('mapContainer', {
        zoom: 13,
        center: [113.665, 34.757],
        mapStyle: 'amap://styles/whitesmoke',
        features: ['bg', 'road', 'building', 'point'],
        resizeEnable: true
    });

    infoWindow = new AMap.InfoWindow({
        isCustom: false,
        autoMove: true,
        offset: new AMap.Pixel(0, -5)
    });

    map.addControl(new AMap.Scale());
    map.addControl(new AMap.ToolBar({ position: 'RT' }));

    // Map-click handler: in edit mode with a pending selection, treat the click
    // as the new position. AMap fires this on the map itself (not on markers, since
    // markers have bubble:false).
    map.on('click', function(e) {
        var dt = Date.now() - lastMarkerClickTime;
        console.log('[Map] map click fired, editMode=', editMode, 'pending=', pendingLight && pendingLight.id, 'dt=', dt);
        if (!editMode) return;
        if (!pendingLight) {
            // 编辑模式下点空白,提示用户先选路灯
            return;
        }
        // 用一个非常短的去抖防 marker click 同事件冒泡(理论 bubble:false 应避免,但稳一点没坏处)
        if (dt < 80) {
            console.log('[Map] map click skipped (within ' + dt + 'ms of marker click)');
            return;
        }
        var p = readLngLat(e, null);
        if (!p) {
            console.error('[Map] map click: cannot read lnglat', e);
            showToast('无法读取点击位置, 请打开 Console 查看', 'error');
            return;
        }
        console.log('[Map] map click @', p.lng, p.lat, 'for pending', pendingLight.id);
        savePendingLocation(p.lng, p.lat);
    });

    // ESC key cancels pending selection
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && pendingLight) {
            clearPending();
            showToast('已取消选中', 'info', 1500);
        }
    });

    // Expose refresh for the toolbar button
    window.refreshMapData = function() {
        showToast('正在刷新...','info', 1500);
        loadDevices();
    };

    // Wait for map to be fully ready, then load devices
    map.on('complete', function() {
        console.log('[Map] Map loaded complete, fetching devices...');
        loadDevices();
    });

})();
</script>
</body>
</html>
