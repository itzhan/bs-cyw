<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">数据统计</h2>
            
<div class="charts-grid">
    <div class="card"><div class="card-header"><h3><i data-lucide="bar-chart-3" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>能耗趋势</h3></div><div class="card-body"><div id="energyTrend" style="height:350px"></div></div></div>
    <div class="card"><div class="card-header"><h3><i data-lucide="bell-ring" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>告警级别分布</h3></div><div class="card-body"><div id="alarmLevel" style="height:350px"></div></div></div>
</div>
<div class="charts-grid">
    <div class="card"><div class="card-header"><h3>�� 各区域设备数</h3></div><div class="card-body"><div id="areaDevice" style="height:350px"></div></div></div>
    <div class="card"><div class="card-header"><h3><i data-lucide="bell-ring" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:4px"></i>告警类型分阵</h3></div><div class="card-body"><div id="alarmType" style="height:350px"></div></div></div>
</div>
        </div>
    </main>
</div>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>if(!initPage('statistics','数据统计'))throw'';</script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script>
async function loadCharts(){
    try{
        const[energy,alLevel,alType,devArea]=await Promise.all([statsApi.energyDaily(),statsApi.alarmByLevel(),statsApi.alarmByType(),statsApi.deviceByArea()]);
        const c1=echarts.init(document.getElementById('energyTrend'));
        c1.setOption({tooltip:{trigger:'axis'},grid:{left:50,right:20,top:20,bottom:30},xAxis:{type:'category',data:energy.data.map(d=>d.date.substring(5)),axisLabel:{color:'#64748B'}},yAxis:{type:'value',name:'kWh',splitLine:{lineStyle:{color:'#F1F5F9'}},axisLabel:{color:'#64748B'}},series:[{type:'bar',data:energy.data.map(d=>Number(d.energy)),itemStyle:{borderRadius:[4,4,0,0],color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#3B82F6'},{offset:1,color:'#93C5FD'}])}}]});
        const c2=echarts.init(document.getElementById('alarmLevel'));
        c2.setOption({tooltip:{trigger:'item'},legend:{bottom:0},color:['#3B82F6','#F59E0B','#EF4444','#DC2626'],series:[{type:'pie',radius:['35%','60%'],center:['50%','45%'],data:alLevel.data.map(d=>({name:d.levelName,value:d.count}))}]});
        const c3=echarts.init(document.getElementById('areaDevice'));
        c3.setOption({tooltip:{trigger:'axis'},grid:{left:50,right:20,top:20,bottom:30},xAxis:{type:'category',data:devArea.data.map(d=>'区域'+d.areaId),axisLabel:{color:'#64748B'}},yAxis:{type:'value',splitLine:{lineStyle:{color:'#F1F5F9'}}},series:[{type:'bar',data:devArea.data.map(d=>d.count),barWidth:30,itemStyle:{borderRadius:[4,4,0,0],color:'#1B3A5C'}}]});
        const c4=echarts.init(document.getElementById('alarmType'));
        c4.setOption({tooltip:{trigger:'item'},legend:{bottom:0},color:['#EF4444','#F59E0B','#3B82F6','#8B5CF6','#10B981','#6B7280'],series:[{type:'pie',radius:'55%',center:['50%','45%'],roseType:'area',data:alType.data.map(d=>({name:d.typeName,value:d.count}))}]});
        window.addEventListener('resize',()=>{c1.resize();c2.resize();c3.resize();c4.resize();});
    }catch(err){showToast(err.message,'error');}
}
loadCharts();
</script>
</body>
</html>
