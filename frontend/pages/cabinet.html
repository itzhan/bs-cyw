<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电柜管理 - 城市智慧路灯管理系统</title>
    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <header class="top-header" id="topHeader"></header>
        <div class="page-content">
            <h2 class="page-title">电柜管理</h2>
            
<div class="card">
    <div class="card-header"><h3>电柜列表</h3></div>
    <div class="card-body">
        <div class="search-bar"><div class="search-input-wrapper"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜索电柜..." onkeyup="if(event.key==='Enter')loadCabinets()"></div><button class="btn btn-primary btn-sm" onclick="loadCabinets()">查询</button></div>
        <div class="table-container"><table class="data-table"><thead><tr><th>编码</th><th>名称</th><th>地址</th><th>容量(路灯)</th><th>状态</th><th>安装日期</th></tr></thead>
        <tbody id="cabinetTableBody"><tr><td colspan="6"><div class="loading"><div class="spinner"></div></div></td></tr></tbody></table></div>
        <div id="pagination"></div>
    </div>
</div>
        </div>
    </main>
</div>
<script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script>if(!initPage('cabinet','电柜管理'))throw'';</script>
<script>
let currentPage=1;
async function loadCabinets(page){currentPage=page||1;try{const res=await cabinetApi.list({page:currentPage,size:10,keyword:document.getElementById('searchInput').value});const d=res.data;
document.getElementById('cabinetTableBody').innerHTML=d.records.map(c=>`<tr><td><code>${c.code}</code></td><td>${c.name}</td><td>${c.address||'-'}</td><td>${c.capacity||'-'}</td><td>${statusTag('cabinetStatus',c.status)}</td><td>${c.installDate||'-'}</td></tr>`).join('')||'<tr><td colspan="6" class="text-center text-muted">暂无数据</td></tr>';
renderPagination('pagination',d.total,d.page,d.size,loadCabinets);}catch(err){showToast(err.message,'error');}}
loadCabinets();
</script>
</body>
</html>
